version: '3.8' 
 
services: 
  redis: 
    image: redis:latest 
    container_name: redis-server 
    ports: 
      - '6379:6379' 
    restart: always 
 
  # docker run --name postgres -e POSTGRES_USER=timur -e POSTGRES_PASSWORD=12345 -e POSTGRES_DB=testdb -p 5432:5432 -d postgres:latest 
  postres: 
    image: postgres:latest 
    container_name: postgres 
    environment: 
      POSTGRES_USER: timur 
      POSTGRES_PASSWORD: 12345 
      POSTGRES_DB: testdb 
    ports: 
      - '5432:5432' 
    restart: always
